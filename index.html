<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storyliving As A Service — Storylivingry Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{--deep:#050810;--cosmos:#0a0f1e;--gold:#c9a84c;--gold-glow:rgba(201,168,76,0.4);--cyan:#4ecdc4;--text:#d8dce8;--text-dim:#6a7190}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--deep);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
        .cosmos{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 120% 80% at 30% 20%,rgba(60,40,120,0.1),transparent),radial-gradient(ellipse 80% 120% at 70% 80%,rgba(30,80,100,0.08),transparent),radial-gradient(circle at 50% 50%,var(--cosmos),var(--deep))}
        .stars{position:fixed;inset:0;z-index:0;background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,0.4),transparent),radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,0.3),transparent),radial-gradient(1px 1px at 50% 10%,rgba(255,255,255,0.5),transparent),radial-gradient(1px 1px at 70% 40%,rgba(255,255,255,0.2),transparent),radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,0.4),transparent),radial-gradient(1.5px 1.5px at 40% 55%,rgba(200,210,255,0.5),transparent),radial-gradient(1px 1px at 85% 15%,rgba(255,255,255,0.35),transparent);animation:starDrift 120s linear infinite}
        @keyframes starDrift{from{transform:translateY(0)}to{transform:translateY(-20px)}}
        .header{position:fixed;top:0;left:0;right:0;z-index:10;text-align:center;padding:16px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);background:linear-gradient(180deg,rgba(5,8,16,0.94) 0%,rgba(5,8,16,0.5) 70%,transparent 100%)}
        .header span{color:var(--gold)}
        .center{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
        .title{font-size:2.6rem;font-weight:700;letter-spacing:0.02em;animation:titleGlow 4s ease-in-out infinite}
        @keyframes titleGlow{0%,100%{text-shadow:0 0 20px var(--gold-glow),0 0 60px rgba(201,168,76,0.15)}50%{text-shadow:0 0 40px var(--gold-glow),0 0 100px rgba(201,168,76,0.25)}}
        .subtitle{font-family:'JetBrains Mono',monospace;font-size:0.8rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--cyan);margin-top:12px}
        .coming{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-dim);margin-top:32px;padding:8px 24px;border:1px solid rgba(120,140,200,0.15);border-radius:20px}
        .back{position:relative;z-index:5;margin-top:24px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--gold);text-decoration:none;letter-spacing:0.1em;opacity:0.7;transition:opacity 0.3s}.back:hover{opacity:1}
        .footer{position:fixed;bottom:0;left:0;right:0;z-index:10;text-align:center;padding:16px;font-family:'JetBrains Mono',monospace;font-size:0.55rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);background:linear-gradient(0deg,rgba(5,8,16,0.94) 0%,rgba(5,8,16,0.5) 70%,transparent 100%)}
        .footer span{color:var(--gold)}
    </style>
</head>
<body>
    <div class="cosmos"></div>
    <div class="stars"></div>
    <div class="header"><span>Fractal Impact</span> · Storylivingry Studio</div>
    <div class="center">
        <div class="title">Storyliving As A Service</div>
        <div class="subtitle">Enter the Graph</div>
        <div class="coming">Coming Soon</div>
        <a href="/network" class="back">Back to Studio</a>
    </div>
    <div class="footer"><span>Fractal Impact</span> · Storylivingry Studio</div>
</body>
</html>
